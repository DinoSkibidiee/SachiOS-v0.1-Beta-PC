name: Build SachiOS ISO

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y live-build

    - name: Build ISO
      run: |
        chmod +x build.sh
        sudo ./build.sh

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: SachiOS-ISO
        path: "*.iso"
